<!DOCTYPE html>
<html>

<head>
    <title>PredictIA</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        h1 {
            text-align: center;
            font-size: 40px;
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
        }

        .card {
            background: #1f2937;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        #resultado {
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

    </style>

</head>


<body>

<div class="container">


<h1>
    PredictIA ⚽🤖
</h1>

<p class="subtitle">
    Análisis inteligente de eventos deportivos
</p>



<div class="card">


<h2>
    Nuevo análisis
</h2>


<label>
    Partido
</label>

<input 
id="partido" 
type="text" 
placeholder="Ej: River vs Boca">



<label>
    Votos equipo local
</label>

<input 
id="river" 
type="number">



<label>
    Votos empate
</label>

<input 
id="empate" 
type="number">



<label>
    Votos equipo visitante
</label>

<input 
id="boca" 
type="number">



<label>
    Rendimiento equipo local (0-100)
</label>

<input 
id="rendimientoLocal" 
type="number">



<label>
    Rendimiento equipo visitante (0-100)
</label>

<input 
id="rendimientoVisitante" 
type="number">



<button onclick="generarPrediccion()">
    Analizar partido 🚀
</button>


</div>



<div id="resultado">

Esperando análisis...

</div>



</div>



<script>


function generarPrediccion(){


const datos = {


    partido: document.getElementById("partido").value,

    river: document.getElementById("river").value,

    empate: document.getElementById("empate").value,

    boca: document.getElementById("boca").value,

    rendimientoLocal: document.getElementById("rendimientoLocal").value,

    rendimientoVisitante: document.getElementById("rendimientoVisitante").value

};



fetch("/predictions", {

    method:"POST",

    headers:{
        "Content-Type":"application/json"
    },

    body:JSON.stringify(datos)

})


.then(response => response.json())


.then(data => {


document.getElementById("resultado").innerHTML = `

<h2>📊 Resultado PredictIA</h2>

<p>
<b>Partido:</b> ${data.producto}
</p>

<p>
<b>Predicción:</b> ${data.prediccion}
</p>

<p>
<b>Confianza:</b> ${data.confianza}
</p>

`;

});


}


</script>


</body>

</html>
